<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <a href="https://www.codewars.com/users/christian-westbrook">
      <img src="https://www.codewars.com/users/christian-westbrook/badges/large" style="display: block; margin-left: 30%; margin-right: auto; margin-bottom: 1em; width: 30em"/>
    </a>

    {%- include footer.html -%}

    <!-- The following code was taken from Huanwei Wang's blog for rendering MathJax in Jekyll -->
    <!-- https://zjuwhw.github.io/2017/06/04/MathJax.html -->
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
          tex2jax: {
            inlineMath: [['$','$'], ['\\(','\\)']],
            processEscapes: true
          }
        });
        </script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-AMS-MML_HTMLorMML" type="text/javascript"></script>

  </body>

</html>
